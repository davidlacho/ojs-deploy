name: Deploy OJS stack

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DO_SSH_KEY }}

      - name: Deploy to DigitalOcean droplet (tor1 / Canada)
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
          MARIADB_ROOT_PASSWORD: ${{ secrets.MARIADB_ROOT_PASSWORD }}
          MARIADB_DATABASE: ${{ secrets.MARIADB_DATABASE }}
          MARIADB_USER: ${{ secrets.MARIADB_USER }}
          MARIADB_PASSWORD: ${{ secrets.MARIADB_PASSWORD }}
          ACME_EMAIL: ${{ secrets.ACME_EMAIL }}
          OJS_HOSTNAME: ${{ secrets.OJS_HOSTNAME }}
        run: |
          set -euo pipefail

          REMOTE_DIR="/opt/ojs"

          ssh -o StrictHostKeyChecking=no "${DO_USER}@${DO_HOST}" "mkdir -p ${REMOTE_DIR}"

          rsync -az --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            ./ "${DO_USER}@${DO_HOST}:${REMOTE_DIR}/"

          ssh -o StrictHostKeyChecking=no "${DO_USER}@${DO_HOST}" bash -lc "
            set -euo pipefail

            # Install Docker Engine + Compose v2 if missing.
            if ! command -v docker >/dev/null 2>&1 || ! sudo docker compose version >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y software-properties-common
              sudo add-apt-repository -y universe
              sudo apt-get update

              sudo apt-get install -y docker.io
              # Install Compose v2 from distro packages when available.
              sudo apt-get install -y docker-compose-plugin || sudo apt-get install -y docker-compose-v2 || true
            fi
            sudo systemctl enable docker --now || true

            # Legacy docker-compose v1 is incompatible with newer Docker in some cases.
            # Require docker compose (v2) and fail fast if unavailable.
            if ! sudo docker compose version >/dev/null 2>&1; then
              echo "docker compose (v2) is required but not available on host."
              exit 1
            fi

            cd \"${REMOTE_DIR}\"

            # Create runtime env (do not store secrets in git).
            printf '%s\n' \
              "TZ=Etc/UTC" \
              "OJS_TARBALL_URL=https://pkp.sfu.ca/ojs/download/ojs-3.5.0-3.tar.gz" \
              "MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}" \
              "MARIADB_DATABASE=${MARIADB_DATABASE}" \
              "MARIADB_USER=${MARIADB_USER}" \
              "MARIADB_PASSWORD=${MARIADB_PASSWORD}" \
              "ACME_EMAIL=${ACME_EMAIL}" \
              "OJS_HOSTNAME=${OJS_HOSTNAME}" \
              > .env

            # Start stack.
            sudo docker compose down --remove-orphans || true
            sudo docker compose up -d --build
            sudo docker compose ps

            # Basic local smoke check from the droplet.
            # Accept common initial responses (200/301/302) while app/setup redirects settle.
            sleep 5
            HTTP_CODE=\$(curl -sS -o /dev/null -w \"%{http_code}\" http://127.0.0.1/ || true)
            echo \"Local HTTP status: \${HTTP_CODE}\"
            if [ \"\${HTTP_CODE}\" != \"200\" ] && [ \"\${HTTP_CODE}\" != \"301\" ] && [ \"\${HTTP_CODE}\" != \"302\" ]; then
              echo \"Unexpected local HTTP status: \${HTTP_CODE}\"
              sudo docker compose logs --tail 200
              exit 1
            fi
          "

      - name: Smoke test public endpoint
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            HTTP_CODE="$(curl -sS -o /dev/null -w '%{http_code}' "http://${DO_HOST}/" || true)"
            echo "Attempt ${attempt}: public HTTP status ${HTTP_CODE}"
            if [ "${HTTP_CODE}" = "200" ] || [ "${HTTP_CODE}" = "301" ] || [ "${HTTP_CODE}" = "302" ]; then
              exit 0
            fi
            sleep 5
          done
          echo "Public endpoint did not return 200/301/302 after retries."
          exit 1

