name: Deploy OJS stack

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DO_SSH_KEY }}

      - name: Deploy to DigitalOcean droplet (tor1 / Canada)
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
          MARIADB_ROOT_PASSWORD: ${{ secrets.MARIADB_ROOT_PASSWORD }}
          MARIADB_DATABASE: ${{ secrets.MARIADB_DATABASE }}
          MARIADB_USER: ${{ secrets.MARIADB_USER }}
          MARIADB_PASSWORD: ${{ secrets.MARIADB_PASSWORD }}
          ACME_EMAIL: ${{ secrets.ACME_EMAIL }}
          OJS_HOSTNAME: ${{ secrets.OJS_HOSTNAME }}
        run: |
          set -euo pipefail

          REMOTE_DIR="/opt/ojs"

          ssh -o StrictHostKeyChecking=no "${DO_USER}@${DO_HOST}" "mkdir -p ${REMOTE_DIR}"

          rsync -az --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            ./ "${DO_USER}@${DO_HOST}:${REMOTE_DIR}/"

          ssh -o StrictHostKeyChecking=no "${DO_USER}@${DO_HOST}" bash -lc "
            set -euo pipefail

            # Install Docker Engine + Compose plugin if missing.
            if ! command -v docker >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y docker.io docker-compose-plugin
            fi
            sudo systemctl enable docker --now

            cd \"${REMOTE_DIR}\"

            # Create runtime env (do not store secrets in git).
            printf '%s\n' \
              "TZ=Etc/UTC" \
              "OJS_TARBALL_URL=https://pkp.sfu.ca/ojs/download/ojs-3.5.0-3.tar.gz" \
              "MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}" \
              "MARIADB_DATABASE=${MARIADB_DATABASE}" \
              "MARIADB_USER=${MARIADB_USER}" \
              "MARIADB_PASSWORD=${MARIADB_PASSWORD}" \
              "ACME_EMAIL=${ACME_EMAIL}" \
              "OJS_HOSTNAME=${OJS_HOSTNAME}" \
              > .env

            # Start stack.
            docker compose up -d --build
          "

