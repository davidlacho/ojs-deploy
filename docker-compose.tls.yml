version: "3.9"

services:
  traefik:
    command:
      - --api.dashboard=false
      - --api.insecure=false
      - --log.level=INFO
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=ojsnet
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt

  ojs:
    labels:
      - 'traefik.http.middlewares.ojs-redirect.redirectscheme.scheme=https'
      - 'traefik.http.routers.ojs-http.middlewares=ojs-redirect'
      - 'traefik.http.routers.ojs-https.entrypoints=websecure'
      - 'traefik.http.routers.ojs-https.rule=Host(`${OJS_HOSTNAME}`)'
      - 'traefik.http.routers.ojs-https.tls=true'
      - 'traefik.http.routers.ojs-https.tls.certresolver=letsencrypt'
      - 'traefik.http.services.ojs-https.loadbalancer.server.port=80'

volumes:
  letsencrypt:

